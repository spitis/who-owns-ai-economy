<text x="56.0" y="984.0" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" fill="#9c9c99" opacity="1.000" style="font-style:italic;">A holdout's firms are charged on their member-market sales plus a capped share of the rest, and members divide it until the holdout joins and claims its share.</text>
