<text x="86.0" y="332.0" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" fill="#8f8f8c" opacity="1.000" style="font-style:italic;">the cap leaves $104B a year uncollected until they join</text>
