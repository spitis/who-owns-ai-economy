<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img">
<title>How much each economy would collect under the club</title>
<desc>Annual collections under a one-percent levy on large firms, showing four member economies and two holdouts.</desc>
<rect x="0" y="0" width="1400" height="1000" fill="#1C1C1D"/>
<text x="700.0" y="52.0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="600" fill="#e6e6e3" opacity="1.000" style="">How much each economy would collect under the club</text>
<text x="700.0" y="84.0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="400" fill="#9c9c99" opacity="1.000" style="font-style:italic;">An annual 1% levy on large firms, apportioned by where each firm sells. Every member collects from covered firms worldwide.</text>
<text x="312.0" y="138.0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="21" font-weight="700" fill="#a6a6a3" opacity="1.000" style="letter-spacing:0.06em;">HOLDING OUT</text>
<text x="1088.0" y="138.0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="21" font-weight="700" fill="#e6e6e3" opacity="1.000" style="letter-spacing:0.06em;">CLUB MEMBERS</text>
<line x1="700.0" y1="156.0" x2="700.0" y2="908.0" stroke="#3a3a3c" stroke-width="1.5" stroke-linecap="butt" stroke-dasharray="9 8" opacity="0.700"/>
<rect x="56.0" y="168.0" width="512.0" height="240.0" rx="14" ry="14" fill="#262627" stroke="#3a3a3c" stroke-width="1.5" opacity="1.000"/>
