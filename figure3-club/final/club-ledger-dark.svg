<text x="86.0" y="248.0" text-anchor="start" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#8f8f8c" opacity="1.000" style="">collects $0 while holding out</text>
<line x1="86.0" y1="270.0" x2="538.0" y2="270.0" stroke="#3a3a3c" stroke-width="1.2" stroke-linecap="butt" opacity="0.900"/>
